<!-- 오른쪽 아래 카메라 + 사진 영역 -->

<div class="camera-section">

    <!-- 목표 사진 -->
    <div class="right-image-box">

        <h3>공부 목표 사진</h3>

        <input type="file"
               id="imageUpload"
               accept="image/*">

        <img id="previewImage">

    </div>

    <!-- 실시간 카메라 -->
    <div class="camera-box">

        <h3>실시간 카메라</h3>

        <video id="camera"
               autoplay
               playsinline>
        </video>

    </div>

</div>
