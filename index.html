<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silent Study Timer</title>

<style>

body{
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#F3F7FB;

    font-family:Arial,sans-serif;
}

.container{

    width:420px;

    background:#FCFEFF;

    padding:40px;

    border-radius:25px;

    text-align:center;

    box-shadow:0 0 20px rgba(0,0,0,0.08);
}

h1{
    color:#3F5366;
}

p{
    color:#72808E;
}

#timer{

    font-size:80px;

    margin:30px 0;

    font-weight:bold;

    color:#44576A;
}

.button-group{

    display:flex;

    justify-content:center;

    gap:10px;
}

button{

    border:none;

    padding:15px 25px;

    border-radius:12px;

    font-size:18px;

    cursor:pointer;

    transition:0.2s;

    font-weight:500;
}

button:hover{

    opacity:0.9;

    transform:scale(1.02);
}

#startBtn{
    background:#D6EAF8;
    color:#4A6572;
}

#pauseBtn{
    background:#DCEEF2;
    color:#4E6A73;
}

#resetBtn{
    background:#E3EDF7;
    color:#5B6B7A;
}

input{

    width:80px;

    padding:10px;

    border-radius:10px;

    border:1px solid #D5E3EE;

    text-align:center;

    font-size:18px;

    background:#F7FAFC;

    color:#556270;
}

#message{

    margin-top:20px;

    color:#667788;
}

</style>

</head>

<body>

<div class="container">

<h1>Silent Study Timer</h1>

<p>조용한 환경을 위한 건강 중심 공부 타이머</p>

<br>

<input type="number"
       id="minutesInput"
       value="1"
       min="1"
       max="50">

분

<div id="timer">01:00</div>

<div class="button-group">

<button id="startBtn">시작</button>

<button id="pauseBtn">정지</button>

<button id="resetBtn">초기화</button>

</div>

<div id="message"></div>

</div>

<script>

const timer = document.getElementById("timer");

const startBtn = document.getElementById("startBtn");

const pauseBtn = document.getElementById("pauseBtn");

const resetBtn = document.getElementById("resetBtn");

const minutesInput = document.getElementById("minutesInput");

const message = document.getElementById("message");

let time = 60;

let interval;

let running = false;

function updateTimer(){

    let minutes = Math.floor(time / 60);

    let seconds = time % 60;

    minutes = String(minutes).padStart(2,"0");

    seconds = String(seconds).padStart(2,"0");

    timer.innerText = `${minutes}:${seconds}`;
}

minutesInput.addEventListener("change", ()=>{

    let selected = Number(minutesInput.value);

    if(selected > 50){

        selected = 50;

        minutesInput.value = 50;
    }

    time = selected * 60;

    updateTimer();
});

startBtn.addEventListener("click", ()=>{

    if(running) return;

    running = true;

    interval = setInterval(()=>{

        time--;

        updateTimer();

        if(time <= 0){

            clearInterval(interval);

            running = false;

            message.innerText = "눈을 쉬어주세요 😊";
        }

    },1000);
});

pauseBtn.addEventListener("click", ()=>{

    clearInterval(interval);

    running = false;

    message.innerText = "타이머 정지";
});

resetBtn.addEventListener("click", ()=>{

    clearInterval(interval);

    running = false;

    let selected = Number(minutesInput.value);

    time = selected * 60;

    updateTimer();

    message.innerText = "";
});

updateTimer();

</script>

</body>
</html>
