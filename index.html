<!-- 오른쪽 -->
<div class="study-record">

    <h2>오늘의 공부 기록</h2>

    <div class="add-subject">

        <input type="text"
               id="subject"
               placeholder="과목 입력">

    </div>

    <div id="recordList"></div>

    <!-- 오른쪽 아래 이미지 업로드 -->

    <div class="right-image-box">

        <h3>공부 목표 사진</h3>

        <input type="file"
               id="imageUpload"
               accept="image/*">

        <img id="previewImage">

    </div>

</div>
