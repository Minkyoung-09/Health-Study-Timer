<!DOCTYPE html>
<html lang="ko">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silent Study Timer</title>

<style>

body{
    margin:0;
    padding:0;

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#F4F8FC;

    font-family:Arial, sans-serif;
}

.container{

    width:500px;

    background:#FFFFFF;

    padding:40px;

    border-radius:25px;

    text-align:center;

    box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

h1{
    color:#4A6170;
    margin-bottom:10px;
}

p{
    color:#7A8A97;
    margin-bottom:25px;
}

.time-setting{

    margin-bottom:20px;

    color:#5F6F7C;

    font-size:18px;
}

select,input{

    width:130px;

    padding:10px;

    border-radius:12px;

    border:1px solid #D6E2EC;

    background:#F9FBFD;

    text-align:center;

    font-size:16px;

    color:#4F6270;

    outline:none;
}

#timer{

    font-size:85px;

    font-weight:bold;

    color:#435866;

    margin:30px 0;
}

.button-group{

    display:flex;

    justify-content:center;

    gap:12px;

    margin-top:20px;
}

button{

    border:none;

    padding:15px 25px;

    border-radius:14px;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:0.2s;
}

button:hover{

    transform:scale(1.03);

    opacity:0.92;
}

#startBtn{

    background:#D6EAF8;

    color:#4B6475;
}

#pauseBtn{

    background:#DDEBF5;

    color:#506876;
}

#resetBtn{

    background:#E5EEF7;

    color:#5B6F80;
}

#message{

    margin-top:25px;

    min-height:30px;

    font-size:20px;

    color:#6B7C88;
}

.study-record{

    margin-top:30px;

    background:#F7FAFD;

    border-radius:18px;

    padding:20px;

    text-align:left;
}

.study-record h3{

    margin-top:0;

    color:#4A6170;
}

.study-record p{

    margin:8px 0;

    color:#5F6F7C;
}

.break{
    background:#EAF4FB;
}

</style>

</head>

<body>

<div class="container">

    <h1>Silent Study Timer</h1>

    <p>조용한 환경을 위한 건강 중심 공부 타이머</p>

    <div class="time-setting">

        과목 선택

        <br><br>

        <select id="subject">

            <option value="수학">수학</option>

            <option value="영어">영어</option>

            <option value="국어">국어</option>

            <option value="과학">과학</option>

        </select>

        <br><br>

        공부 시간 설정 (최대 50분)

        <br><br>

        <input type="number"
               id="minutesInput"
               min="1"
               max="50"
               value="1">

        분

    </div>

    <div id="timer">01:00</div>

    <div class="button-group">

        <button id="startBtn">시작</button>

        <button id="pauseBtn">정지</button>

        <button id="resetBtn">초기화</button>

    </div>

    <div id="message"></div>

    <div class="study-record">

        <h3>오늘의 공부 기록</h3>

        <p id="mathRecord">수학 : 0분</p>

        <p id="englishRecord">영어 : 0분</p>

        <p id="koreanRecord">국어 : 0분</p>

        <p id="scienceRecord">과학 : 0분</p>

    </div>

</div>

<script>

const timer = document.getElementById("timer");

const startBtn = document.getElementById("startBtn");

const pauseBtn = document.getElementById("pauseBtn");

const resetBtn = document.getElementById("resetBtn");

const minutesInput = document.getElementById("minutesInput");

const message = document.getElementById("message");

const subject = document.getElementById("subject");

let time = 60;

let breakTime = 10;

let interval;

let running = false;

let isBreak = false;

let studyData = JSON.parse(localStorage.getItem("studyData")) || {

    수학:0,
    영어:0,
    국어:0,
    과학:0
};

function updateRecords(){

    document.getElementById("mathRecord").innerText =
    `수학 : ${studyData["수학"]}분`;

    document.getElementById("englishRecord").innerText =
    `영어 : ${studyData["영어"]}분`;

    document.getElementById("koreanRecord").innerText =
    `국어 : ${studyData["국어"]}분`;

    document.getElementById("scienceRecord").innerText =
    `과학 : ${studyData["과학"]}분`;
}

function updateTimer(){

    let minutes = Math.floor(time / 60);

    let seconds = time % 60;

    minutes = String(minutes).padStart(2,"0");

    seconds = String(seconds).padStart(2,"0");

    timer.innerText = `${minutes}:${seconds}`;
}

minutesInput.addEventListener("change", ()=>{

    let selected = Number(minutesInput.value);

    if(selected > 50){

        selected = 50;

        minutesInput.value = 50;
    }

    if(selected < 1){

        selected = 1;

        minutesInput.value = 1;
    }

    time = selected * 60;

    updateTimer();
});

startBtn.addEventListener("click", ()=>{

    if(running) return;

    running = true;

    interval = setInterval(()=>{

        time--;

        updateTimer();

        if(time <= 0){

            clearInterval(interval);

            running = false;

            if(!isBreak){

                let selectedSubject = subject.value;

                let studyMinutes = Number(minutesInput.value);

                studyData[selectedSubject] += studyMinutes;

                localStorage.setItem(
                    "studyData",
                    JSON.stringify(studyData)
                );

                updateRecords();

                document.body.classList.add("break");

                message.innerText = "눈을 쉬어주세요 😊";

                isBreak = true;

                time = breakTime;

                updateTimer();

                startBtn.click();

            }else{

                document.body.classList.remove("break");

                message.innerText = "다시 공부를 시작하세요 📚";

                isBreak = false;

                let selected = Number(minutesInput.value);

                time = selected * 60;

                updateTimer();
            }
        }

    },1000);
});

pauseBtn.addEventListener("click", ()=>{

    clearInterval(interval);

    running = false;

    message.innerText = "타이머 정지";
});

resetBtn.addEventListener("click", ()=>{

    clearInterval(interval);

    running = false;

    isBreak = false;

    let selected = Number(minutesInput.value);

    time = selected * 60;

    updateTimer();

    message.innerText = "";

    document.body.classList.remove("break");
});

updateTimer();

updateRecords();

</script>

</body>

</html>
