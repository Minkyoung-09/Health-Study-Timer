<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silent Study Timer</title>

  <style>

    body{
      margin:0;
      padding:0;
      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      background:#f4f7fb;

      font-family:Arial, sans-serif;

      transition:1s;
    }

    .container{

      width:430px;

      background:white;

      padding:40px;

      border-radius:20px;

      box-shadow:0 0 20px rgba(0,0,0,0.1);

      text-align:center;
    }

    h1{
      margin-bottom:10px;
      color:#222;
    }

    p{
      color:#666;
      margin-bottom:25px;
    }

    .time-setting{

      margin-bottom:25px;

      font-size:18px;
    }

    input{

      width:90px;

      padding:10px;

      border-radius:10px;

      border:1px solid #ccc;

      text-align:center;

      font-size:18px;
    }

    #timer{

      font-size:80px;

      font-weight:bold;

      margin:30px 0;

      color:#222;
    }

    .button-group{

      display:flex;

      justify-content:center;

      gap:10px;

      margin-top:20px;
    }

    button{

      padding:15px 25px;

      border:none;

      border-radius:12px;

      font-size:18px;

      cursor:pointer;

      transition:0.3s;
    }

    button:hover{
      opacity:0.85;
    }

    #startBtn{
      background:#4CAF50;
      color:white;
    }

    #pauseBtn{
      background:#ff9800;
      color:white;
    }

    #resetBtn{
      background:#f44336;
      color:white;
    }

    #message{

      margin-top:25px;

      font-size:22px;

      min-height:30px;

      color:#444;
    }

    .break{
      background:#dfffe0;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Silent Study Timer</h1>

    <p>조용한 환경을 위한 건강 중심 공부 타이머</p>

    <div class="time-setting">

      공부 시간 설정 (최대 50분)

      <br><br>

      <input type="number" id="minutesInput" min="1" max="50" value="1">

      분

    </div>

    <div id="timer">01:00</div>

    <div class="button-group">

      <button id="startBtn">시작</button>

      <button id="pauseBtn">정지</button>

      <button id="resetBtn">초기화</button>

    </div>

    <div id="message"></div>

  </div>

  <audio id="alarm">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
  </audio>

  <script>

    const timer = document.getElementById("timer");

    const startBtn = document.getElementById("startBtn");

    const pauseBtn = document.getElementById("pauseBtn");

    const resetBtn = document.getElementById("resetBtn");

    const message = document.getElementById("message");

    const alarm = document.getElementById("alarm");

    const minutesInput = document.getElementById("minutesInput");

    let time = 60;

    let running = false;

    let interval;

    function updateTimer(){

      let minutes = Math.floor(time / 60);

      let seconds = time % 60;

      minutes = String(minutes).padStart(2,"0");

      seconds = String(seconds).padStart(2,"0");

      timer.innerText = `${minutes}:${seconds}`;
    }

    startBtn.addEventListener("click", ()=>{

      if(running) return;

      if(time <= 0){

        let selectedMinutes = Number(minutesInput.value);

        time = selectedMinutes * 60;
      }

      running = true;

      interval = setInterval(()=>{

        time--;

        updateTimer();

        if(time <= 0){

          clearInterval(interval);

          running = false;

          alarm.volume = 0.1;

          alarm.play();

          document.body.classList.add("break");

          message.innerText = "눈을 쉬어주세요 😊";
        }

      },1000);

    });

    pauseBtn.addEventListener("click", ()=>{

      clearInterval(interval);

      running = false;

      message.innerText = "타이머가 정지되었습니다.";
    });

    resetBtn.addEventListener("click", ()=>{

      clearInterval(interval);

      running = false;

      let selectedMinutes = Number(minutesInput.value);

      if(selectedMinutes > 50){

        alert("최대 50분까지 설정 가능합니다.");

        selectedMinutes = 50;

        minutesInput.value = 50;
      }

      time = selectedMinutes * 60;

      updateTimer();

      document.body.classList.remove("break");

      message.innerText = "";
    });

    minutesInput.addEventListener("change", ()=>{

      let selectedMinutes = Number(minutesInput.value);

      if(selectedMinutes > 50){

        alert("최대 50분까지 설정 가능합니다.");

        selectedMinutes = 50;

        minutesInput.value = 50;
      }

      time = selectedMinutes * 60;

      updateTimer();
    });

    updateTimer();

  </script>

</body>
</html>
